<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-content" />
  <title>Kiro · New chat</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#F2F1F4" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Kiro" />
  <link rel="apple-touch-icon" href="./assets/kiro-app.png" />

  <link rel="icon" type="image/png" href="./assets/kiro-app.png" />
  <link rel="stylesheet" href="./styles.css?v=45" />

  <!-- Theme bootstrap — resolve & apply before first paint (no flash).
       app.js owns updates, the OS-change listener and the selector. -->
  <script>(function(){try{var c=localStorage.getItem('kiro-theme')||'system';var d=c==='dark'||(c==='system'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';var m=document.querySelector('meta[name="theme-color"]');if(m)m.content=d?'#19161D':'#F2F1F4';}catch(e){}})();</script>
</head>
<body>
  <div class="app">

    <header class="top-bar top-bar--chat">
      <a class="icon-btn icon-btn--pill" href="./index.html" aria-label="Menu">
        <img class="icon icon-light" src="./assets/icon-menu.svg" alt="" />
      </a>
      <div class="chat-title">
        <button class="chat-title__selector" type="button" aria-haspopup="true">
          <span class="chat-title__name">Claude Opus 4.7</span>
          <img class="chat-title__caret icon icon-light" src="./assets/icon-chevron-down.svg" alt="" />
        </button>
        <span class="chat-title__meta">1M Context · High</span>
      </div>
      <div class="top-bar__actions">
        <button class="icon-btn" aria-label="More">
          <img class="icon icon-light" src="./assets/icon-ellipsis.svg" alt="" />
        </button>
        <button class="icon-btn icon-btn--inset-circle" aria-label="New chat">
          <img class="icon icon-light" src="./assets/icon-edit.svg" alt="" />
        </button>
      </div>
    </header>

    <main class="content" id="content">
      <section class="empty-state">
        <img class="empty-state__ghost" src="./assets/logo-kiro-ghost.svg" alt="" />
        <div class="empty-state__text">
          <h1 class="empty-state__title">Let’s build</h1>
          <p class="empty-state__subtitle">Plan, search or build anything</p>
          <button class="repo-pill" type="button" data-sheet="sheet-connect-repo" aria-label="Change repository" hidden>
            <span class="repo-pill__icon" aria-hidden="true"></span>
            <span class="repo-pill__label"></span>
            <img class="repo-pill__caret icon icon-subtle" src="./assets/icon-chevron-down.svg" alt="" />
          </button>
        </div>
      </section>
    </main>

    <div class="bottom-bar bottom-bar--connect">
      <button class="connect-btn" type="button" data-sheet="sheet-connect-repo">
        <span class="connect-btn__icon">
          <img class="icon icon-subtle" src="./assets/icon-source-control.svg" alt="" />
        </span>
        <span class="connect-btn__label">Connect to a repo to get started…</span>
      </button>
    </div>

    <div class="bottom-bar bottom-bar--chat" role="search" hidden>
      <div class="chat-input">
        <button class="icon-btn" aria-label="Add attachment">
          <img class="icon icon-light" src="./assets/icon-add.svg" alt="" />
        </button>
        <div class="chat-input__field" contenteditable="true" role="textbox" aria-label="Ask Kiro" data-placeholder="Ask Kiro…"></div>
        <button class="icon-btn icon-btn--inset-circle" aria-label="Voice">
          <img class="icon icon-light" src="./assets/icon-mic.svg" alt="" />
        </button>
      </div>
    </div>

  </div>

  <!-- ============== CONNECT-REPO SHEET ============== -->
  <!-- Max-height bottom sheet. Repos mirror the menu's chat metadata
       (index.html .item__meta), grouped by owner: kiro-ux → Kiro,
       acme-dev → ACME. Single-select; picking one updates the connect
       button label and closes the sheet. -->
  <dialog id="sheet-connect-repo" class="sheet sheet--max" aria-labelledby="sheet-connect-repo-title">
    <div class="sheet__panel">
      <div class="sheet__handle" aria-hidden="true"></div>

      <header class="sheet__header">
        <button class="sheet__close" data-close aria-label="Close">
          <img class="icon icon-light" src="./assets/icon-close.svg" alt="" />
        </button>
        <div class="sheet__title-block">
          <h2 class="sheet__title" id="sheet-connect-repo-title">Connect to a repository</h2>
        </div>
        <span aria-hidden="true"></span>
      </header>

      <div class="sheet__body sheet__body--flush">
        <div class="repo-list" role="radiogroup" aria-label="Repositories">

          <h3 class="repo-list__header">Kiro</h3>
          <button class="repo-row repo-row--selected" type="button" role="radio" aria-checked="true" data-repo="kiro-ux/kiro-app">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">kiro-app</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>

          <h3 class="repo-list__header">ACME</h3>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/auth-service">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">auth-service</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/dashboard-ui">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">dashboard-ui</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/notifications">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">notifications</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/project-tracker">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">project-tracker</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/mobile-app">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">mobile-app</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/realtime-server">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">realtime-server</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/infra-config">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">infra-config</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/core-db">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">core-db</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/search-engine">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">search-engine</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/storefront">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">storefront</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>
          <button class="repo-row" type="button" role="radio" aria-checked="false" data-repo="acme-dev/payments-api">
            <img class="repo-row__icon icon icon-muted" src="./assets/icon-lock.svg" alt="Private" />
            <span class="repo-row__label">payments-api</span>
            <span class="repo-row__check" aria-hidden="true"></span>
          </button>

        </div>
      </div>

      <div class="sheet__footer">
        <div class="search-field">
          <button class="icon-btn icon-btn--sm" type="button" aria-label="Search">
            <img class="icon icon-muted" src="./assets/icon-search.svg" alt="" />
          </button>
          <div class="search-input search-input--static" role="button" aria-label="Search and filter repositories" data-placeholder="Search and filter your repositories…"></div>
        </div>
        <button class="repo-refresh-btn" type="button" aria-label="Refresh repositories">
          <img class="icon icon-on-dark" src="./assets/icon-refresh.svg" alt="" />
        </button>
      </div>
    </div>
  </dialog>

  <script src="./app.js?v=45"></script>
</body>
</html>
